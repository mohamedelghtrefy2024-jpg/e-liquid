function getBrandCatalog(brand) {
  const seen = new Set(), result = [];
  for (const e of BRAND_DB) {
    if (e.brand !== brand || e.type !== "Flavor") continue;
    if (!seen.has(e.n)) { seen.add(e.n); result.push(e); }
  }
  return result.sort((a,b)=>a.n.localeCompare(b.n));
}
function getBrandBasePrices(brand) {
  const result = {};
  for (const e of BRAND_DB) {
    if (e.brand !== brand) continue;
    if (e.type==="PG")       result.pg  = {pr:e.pr, sz:e.sz};
    if (e.type==="VG")       result.vg  = {pr:e.pr, sz:e.sz};
    if (e.type==="Nicotine") result.nic = {pr:e.pr, sz:e.sz};
  }
  return result;
}

/** تطبيع بسيط للنص قبل المطابقة: lowercase للإنجليزي + إزالة التشكيل العربي
 *  وتوحيد صور الألف/التاء المربوطة/الياء، عشان "Mango"/"mango"/"مانجة"/
 *  "مانجه" كلها تتطابق مع نفس الكلمة المفتاحية دون الحاجة لتكرارها. */
function normalizeFlavorText(s) {
  return String(s)
    .toLowerCase()
    .replace(/[\u064B-\u065F\u0670]/g, "")   // تشكيل عربي
    .replace(/[إأآا]/g, "ا")
    .replace(/ة/g, "ه")
    .replace(/ى/g, "ي")
    .trim();
}

function inferFlavorEmoji(name) {
  if (!name) return null;
  const norm = normalizeFlavorText(name);
  if (!norm) return null;
  for (const [keywords, emoji] of FLAVOR_EMOJI_KEYWORDS) {
    for (const kw of keywords) {
      if (norm.includes(normalizeFlavorText(kw))) return emoji;
    }
  }
  return null;
}

function I(e,t=3){return Math.round(e*Math.pow(10,t))/Math.pow(10,t)}
function Ie(e,t){return I(e*t)}
function Jt(e){return Math.round(e*Jd)}

// ─── PRECISION (CRITICAL-08) ────────────────────────────────────────────────
function roundTo(value, decimals = 3) {
  if (!Number.isFinite(value)) return 0;
  return I(value, decimals);
}

// ─── SAFE DIVIDE (FIX-10) ────────────────────────────────────────────────────
// يمنع NaN و Infinity في أي عملية قسمة داخل المحرك.
// safeDivide(a, b, fallback=0): إذا كان b=0 أو غير محدد → fallback
function safeDivide(a, b, fallback = 0) {
  if (!b || !Number.isFinite(b) || b === 0) return fallback;
  const result = a / b;
  return Number.isFinite(result) ? result : fallback;
}

function _qdImpl(e,t){
  const n=[],r=e.targetVolumeMl;let l=0;

  // FIX-5 / FIX-6: حماية من r=0 أو r غير صالح — كل حسابات النسب (l/r*100 إلخ)
  // تنتج Infinity لو r=0، و I() لا تحمي من Infinity. نُعيد نتيجة آمنة فارغة.
  if(!r||!Number.isFinite(r)||r<=0){
    return{nicotine:{name:t.ingNicotineBase,ml:0,g:0,drops:0,pct:0,cost:0},
      pg:{name:t.ingPG,ml:0,g:0,drops:0,pct:0,cost:0},
      vg:{name:t.ingVG,ml:0,g:0,drops:0,pct:0,cost:0},
      water:{name:t.ingDistilledWater,ml:0,g:0,drops:0,pct:0,cost:0},
      alcohol:{name:t.ingAlcohol,ml:0,g:0,drops:0,pct:0,cost:0},
      flavors:[],totalFlavorPct:0,totalMl:0,totalG:0,totalCost:0,
      costPerMl:0,actualPg:0,actualVg:0,actualNic:0,actualPgPct:0,actualVgPct:0,actualWaterPct:0,actualAlcoholPct:0,warnings:[]}
  }

  const nicDensity = e.customNicDensity||NIC_SALT_DENSITIES[e.nicType]||1.01;
  if(e.targetNicStrength>0&&e.nicStockStrength>0) l=e.targetNicStrength*r/e.nicStockStrength;
  if(e.targetNicStrength>0&&e.nicStockStrength<e.targetNicStrength) n.push({level:"error",code:"NIC_TOO_LOW",msg:t.warnNicTooLow(e.nicStockStrength,e.targetNicStrength)});
  if(e.targetNicStrength>0&&e.targetNicStrength<20&&e.nicType!=="freebase") n.push({level:"info",code:"NIC_SALT_LOW",msg:t.nicSaltWarning});

  // FIX-8: تحذير تجاوز حجم النيكوتين 90% من الحجم الكلي
  if(l>0&&l>r*0.9) n.push({level:"error",code:"NIC_VOL_LIMIT",msg:t.warnNicVolLimit||"Nicotine volume exceeds 90% of total volume"});

  // REMAINING-03: Dynamic Nicotine Warnings based on deviceType
  const _deviceType = e.deviceType||"mtl";
  if(e.nicType!=="freebase"&&e.targetNicStrength>20&&_deviceType==="subohm")
    n.push({level:"error",code:"NIC_SALT_SUBOHM",msg:t.warnNicSaltSubohm||"Nic salt >20mg/ml in sub-ohm device — risk of overdose"});
  if(e.nicType!=="freebase"&&e.targetNicStrength>50&&_deviceType==="subohm")
    n.push({level:"error",code:"NIC_SALT_EXTREME",msg:t.warnNicSaltExtreme||"Nic salt >50mg/ml in sub-ohm — extreme concentration, not recommended"});
  if(e.nicType==="freebase"&&e.targetNicStrength>20&&_deviceType==="pod")
    n.push({level:"warning",code:"FREEBASE_POD_HIGH",msg:t.warnFreebasePodHigh||"Freebase >20mg/ml in pod — consider nic salt instead"});
  if(e.targetNicStrength<6&&e.targetNicStrength>0&&_deviceType==="mtl")
    n.push({level:"info",code:"NIC_LOW_MTL",msg:t.warnNicLowMtl||"Nicotine <6mg/ml in MTL device — may feel too light"});

  let o=l*e.nicCarrierPgRatio,i=l*(1-e.nicCarrierPgRatio),u=roundTo(e.waterPct/100*r),s=roundTo(e.alcoholPct/100*r);
  const f=e.flavors.reduce((E,M)=>E+M.pct,0);
  if(f>25) n.push({level:"warning",code:"OVER_FLAVOR",msg:t.warnOverFlavor(I(f,1))});
  if(f<3&&e.flavors.length>0) n.push({level:"info",code:"UNDER_FLAVOR",msg:t.warnUnderFlavor(I(f,1))});
  // TASK-2: تحذيرات ديناميكية إضافية تعتمد على flavorCount و averageFlavorPct (بجانب التحذيرات القديمة أعلاه)
  const flavorCount=e.flavors.length;
  const averageFlavorPct=flavorCount>0?safeDivide(f,flavorCount):0;
  if(flavorCount>=6&&f>18) n.push({level:"warning",code:"FLAVOR_MUTING_RISK",msg:t.warnFlavorMuting||"Total flavor percentage may cause muting with 6+ flavors"});
  if(flavorCount>=8&&averageFlavorPct<1) n.push({level:"info",code:"FLAVOR_NEGLIGIBLE",msg:t.warnFlavorNegligible||"Many low-percentage flavors may have negligible impact"});
  if(flavorCount<=2&&f>25) n.push({level:"warning",code:"FLAVOR_HIGH_SIMPLE",msg:t.warnFlavorHighSimple||"High flavor load for a simple recipe"});
  let v=0,h=0;
  let m=e.flavors.map(E=>{
    const M=roundTo(E.pct/100*r);v+=M*E.pgRatio;h+=M*(1-E.pgRatio);
    const dens=e.customFlavDensities&&e.customFlavDensities[E.id]?e.customFlavDensities[E.id]:(E.pgRatio>=0.5?ze.FLAVOR_PG:ze.FLAVOR_VG);
    return{name:E.name,mfr:E.mfr,ml:roundTo(M),g:Ie(M,dens),drops:Jt(M),pct:E.pct,cost:roundTo(M*E.costPerMl,4),emoji:E.emoji}
  });
  const x=e.pgRatio*r,C=(1-e.pgRatio)*r;

  // FIX-1 / FIX-2: حساب العجز الحقيقي — لا نخفيه بـ Math.max(0)
  // pgRaw: ما تبقى من PG بعد خصم ناقل النيكوتين + نكهات PG + كحول
  // vgRaw: ما تبقى من VG بعد خصم ناقل النيكوتين + نكهات VG + ماء
  const pgRaw=roundTo(x-o-v-s), vgRaw=roundTo(C-i-h-u);
  let k=pgRaw<0?0:pgRaw, F=vgRaw<0?0:vgRaw;

  // FIX-1: تحذير عجز PG (الناقلات تستهلك أكثر من PG المتاح)
  if(pgRaw<-0.01) n.push({level:"warning",code:"PG_SHORTAGE",msg:t.warnPgShortage?t.warnPgShortage(I(Math.abs(pgRaw),2)):t.warnExcessPG});
  // FIX-3: تحذير عجز VG (غير موجود في الإصدار السابق)
  if(vgRaw<-0.01) n.push({level:"warning",code:"VG_SHORTAGE",msg:t.warnVgShortage?t.warnVgShortage(I(Math.abs(vgRaw),2)):"VG shortage: carriers/water consume more VG than available"});

  // FIX-VOLUME-OVERFLOW: عند عجز PG/VG فعلي (pgRaw<0 أو vgRaw<0)، الناقلات (نيكوتين+نكهات+ماء+كحول)
  // تستهلك أكثر من ميزانية PG أو VG المتاحة، فيتضخم الحجم الكلي الفعلي فوق الهدف r
  // (مثال حقيقي: طلب 1000مل ينتج 1333.333مل). نطبّق معامل تصغير نسبي واحد على كل المكونات
  // معاً (PG, VG, ماء, كحول, نيكوتين, كل النكهات) دون تغيير أي نسبة بينها، فيرجع الحجم الكلي = r بالضبط.
  // التحذيرات PG_SHORTAGE/VG_SHORTAGE أعلاه تبقى كما هي لتوضيح السبب للمستخدم.
  const cBeforeScale=l+k+F+m.reduce((E,M)=>E+M.ml,0)+u+s;
  if(cBeforeScale>r&&(pgRaw<-0.01||vgRaw<-0.01)){
    const scale=r/cBeforeScale;
    l=roundTo(l*scale); k=roundTo(k*scale); F=roundTo(F*scale); u=roundTo(u*scale); s=roundTo(s*scale);
    o=l*e.nicCarrierPgRatio; i=l*(1-e.nicCarrierPgRatio);
    v=v*scale; h=h*scale;
    m=m.map(fl=>({...fl,ml:roundTo(fl.ml*scale),g:roundTo(fl.g*scale),drops:Jt(fl.ml*scale)}));
    n.push({level:"warning",code:"VOLUME_AUTO_SCALED",msg:t.warnVolumeAutoScaled?t.warnVolumeAutoScaled(I((1-scale)*100,1)):"Recipe components were scaled down proportionally to match the target volume"});
  }

  const pgDens=e.customPgDensity||ze.PG;
  const vgDens=e.customVgDensity||ze.VG;
  const waterDens=e.customWaterDensity||ze.WATER;
  const alcDens=e.customAlcDensity||ze.ALCOHOL;
  const c=roundTo(l+k+F+m.reduce((E,M)=>E+M.ml,0)+u+s);
  const a=c>0?I((o+v+s+k)/c*100,1):0,d=c>0?I((i+h+u+F)/c*100,1):0,g=c>0?I(l*e.nicStockStrength/c,2):0;
  // TASK-1: نسب مستقلة حقيقية (PG/VG/Water/Alcohol) من إجمالي الحجم الفعلي c — بدون دمج Water/Alcohol داخل PG/VG
  const actualPgPct=roundTo(safeDivide(k,c)*100,2), actualVgPct=roundTo(safeDivide(F,c)*100,2),
        actualWaterPct=roundTo(safeDivide(u,c)*100,2), actualAlcoholPct=roundTo(safeDivide(s,c)*100,2);
  const _=Ie(l,nicDensity)+Ie(k,pgDens)+Ie(F,vgDens)+m.reduce((E,M)=>E+M.g,0)+Ie(u,waterDens)+Ie(s,alcDens);
  const j=m.reduce((E,M)=>E+M.cost,0);
  const z=roundTo(l*e.nicCostPerMl+k*e.pgCostPerMl+F*e.vgCostPerMl+j+e.bottleCost,3);
  // Volume drift check
  const drift=Math.abs(c-r);if(drift>r*0.01&&drift>0.5) n.push({level:"info",code:"VOLUME_DRIFT",msg:t.volumeDriftWarning(c,r)});
  // FIX-7: costPerMl محمي من c=0 عبر safeDivide
  // FIX-9: حذف totalPct — كان يُحسب ولا يُستهلك في أي مكان (Dead Code)
  return{nicotine:{name:t.ingNicotineBase,ml:roundTo(l),g:Ie(l,nicDensity),drops:Jt(l),pct:roundTo(safeDivide(l,r)*100,2),cost:roundTo(l*e.nicCostPerMl,4),pgRatio:e.nicCarrierPgRatio},pg:{name:t.ingPG,ml:roundTo(k),g:Ie(k,pgDens),drops:Jt(k),pct:roundTo(safeDivide(k,r)*100,2),cost:roundTo(k*e.pgCostPerMl,4)},vg:{name:t.ingVG,ml:roundTo(F),g:Ie(F,vgDens),drops:Jt(F),pct:roundTo(safeDivide(F,r)*100,2),cost:roundTo(F*e.vgCostPerMl,4)},water:{name:t.ingDistilledWater,ml:u,g:Ie(u,waterDens),drops:Jt(u),pct:e.waterPct,cost:0},alcohol:{name:t.ingAlcohol,ml:s,g:Ie(s,alcDens),drops:Jt(s),pct:e.alcoholPct,cost:0},flavors:m,totalFlavorPct:roundTo(f,2),totalMl:roundTo(c),totalG:roundTo(_),totalCost:z,costPerMl:safeDivide(z,c,0),actualPg:a,actualVg:d,actualNic:g,actualPgPct,actualVgPct,actualWaterPct,actualAlcoholPct,warnings:n}
}

// يمنع Crash عند: undefined في translations (t)، density lookups، custom density access، أو reduce()/map() على بيانات غير متوقعة.
// عند الخطأ: لا Crash إطلاقاً — يُرجَع Safe Result Object كامل البنية (نفس شكل الناتج الطبيعي) مع valid:false و error:true،
// ليبقى متوافقاً مع كل أماكن استخدام res.* في الواجهة دون الحاجة لتعديلها.
function qd(e,t){

      nicotine:{name:safeT.ingNicotineBase||"Nicotine",ml:0,g:0,drops:0,pct:0,cost:0},
      pg:{name:safeT.ingPG||"PG",ml:0,g:0,drops:0,pct:0,cost:0},
      vg:{name:safeT.ingVG||"VG",ml:0,g:0,drops:0,pct:0,cost:0},
      water:{name:safeT.ingDistilledWater||"Water",ml:0,g:0,drops:0,pct:0,cost:0},
      alcohol:{name:safeT.ingAlcohol||"Alcohol",ml:0,g:0,drops:0,pct:0,cost:0},

function fmtEGP(val,decimals=2){

  return `${I(val,decimals)} ج.م`;
}

// FIX: دالة تطهير النصوص لمنع XSS عند عرض أسماء النكهات/الشركات المصنعة

// ───── validators/validators.js ─────
// ─── VALIDATORS (CRITICAL-07) ────────────────────────────────────────────────
// إطار تحقق موحّد لمنع دخول NaN / Infinity / أرقام سالبة غير منطقية / قيم
// ضخمة بشكل غير واقعي إلى محرك الحساب. كل دالة ترجّع قيمة آمنة مضمونة
// الاستخدام مباشرة في الحسابات، ولا ترمي استثناءات أبداً.

const DEFAULT_MAX_NUMBER = 1_000_000;

/**
 * يتحقق من رقم عام ويرجّع رقماً صالحاً دائماً (fallback لو غير صالح).
 * يرفض: NaN, Infinity, -Infinity. يقيّد بين min و max.
 */
function validateNumber(value, { min = -DEFAULT_MAX_NUMBER, max = DEFAULT_MAX_NUMBER, fallback = 0 } = {}) {
  const n = typeof value === "number" ? value : parseFloat(value);
  if (!Number.isFinite(n)) return fallback;
  if (n < min) return min;
  if (n > max) return max;
  return n;
}

/**
 * نسبة مئوية: بين 0 و 100 (أو حد أعلى مخصص، مثل نسب النكهات التي قد تتجاوز
 * نظرياً لكن يجب أن تبقى محدودة لمنع قيم سخيفة كـ 999999%).
 */
function validatePercentage(value, { min = 0, max = 100, fallback = 0 } = {}) {
  return validateNumber(value, { min, max, fallback });
}

/**
 * سعر/تكلفة: لا يمكن أن يكون سالباً، ولا أكبر من حد معقول.
 */
function validatePrice(value, { max = DEFAULT_MAX_NUMBER, fallback = 0 } = {}) {
  return validateNumber(value, { min: 0, max, fallback });
}

/**
 * حجم/كمية فيزيائية (مل، جرام...): لا يمكن أن تكون سالبة.
 */
function validateVolume(value, { max = DEFAULT_MAX_NUMBER, fallback = 0 } = {}) {
  return validateNumber(value, { min: 0, max, fallback });
}

/**
 * نص: يتحقق من أنه string، يقصّ الطول، ويترك تطهير HTML/XSS لـ sanitizeText
 * الموجودة في helpers.js (لا نكرر المنطق هنا — هذه الدالة فقط تضمن الشكل).
 */
function validateText(value, { maxLength = 100, fallback = "" } = {}) {
  if (value === null || value === undefined) return fallback;
  const str = String(value);
  return str.slice(0, maxLength);
}

/**
 * يتحقق أن القيمة واحدة من مجموعة مسموحة (enum-like)، وإلا يرجّع fallback.
 * مفيد لحقول مثل nicType, volPreset.
 */
function validateEnum(value, allowedValues, fallback) {
  return allowedValues.includes(value) ? value : fallback;
}

/**
 * يغلّف دالة حساب: لو أي مدخل فيها NaN/Infinity بعد التحقق، يرجّع fallback
 * بدل تمرير قيم فاسدة لمحرك الحساب qd(). استخدام اختياري عند الحاجة لحارس
 * شامل قبل استدعاء qd في App.js.
 */
function isSafeNumber(value) {
  const n = typeof value === "number" ? value : parseFloat(value);
  return Number.isFinite(n);
}


// ───── services/errorLogger.js ─────
// ─── ERROR LOGGER SERVICE (CRITICAL-19) ──────────────────────────────────────
// تسجيل الأخطاء غير المتوقعة في localStorage — max 50 خطأ.
// مقاوم للفشل: لا يرمي استثناءات أبداً.
// FIX-09 (BUG-07): يستخدم storageService كطبقة وصول مركزية بدل localStorage
// المباشر. الاستدعاء مؤجَّل (lazy) لأن كلاهما singletons على مستوى الموديول
// ولا يوجد اعتماد ترتيب تنفيذ فعلي — storageService متاح دائماً وقت الاستدعاء.
const errorLogger = (() => {
  // FIX-09: storageService يضيف prefix "epp_" تلقائياً — نمرر المفتاح بدونه
  const ERROR_LOG_KEY = 'error_log';
  const MAX_ERRORS    = 50;

  // lazy helpers — storageService.get/set/remove تُستدعى عند التنفيذ الفعلي وليس التعريف
  function _readLog() {
    try {
      const entries = storageService.get(ERROR_LOG_KEY, null);
      return Array.isArray(entries) ? entries : [];
    } catch { return []; }
  }
  function _writeLog(entries) {
    try { storageService.set(ERROR_LOG_KEY, entries); } catch { /* صامد */ }
  }

  return {
    logError(context, error, extra = {}) {
      try {
        const entry = { timestamp: new Date().toISOString(), context, message: error instanceof Error ? error.message : String(error), stack: error instanceof Error ? (error.stack || '') : '', extra };
        const updated = [..._readLog(), entry].slice(-MAX_ERRORS);
        _writeLog(updated);
        console.error(`[ErrorLogger][${context}]`, error, extra);
      } catch { /* صامد */ }
    },
    getErrors() { try { return _readLog(); } catch { return []; } },
    clearErrors() { try { storageService.remove(ERROR_LOG_KEY); } catch { /* صامد */ } },
    errorCount() { return this.getErrors().length; },
  };
})();

// ───── services/storageService.js ─────
// ─── STORAGE SERVICE (CRITICAL-01) ──────────────────────────────────────────
// طبقة مركزية للتعامل مع localStorage بأمان: لا ترمي استثناءات أبداً،
// تتحقق من صحة JSON، وترجع قيمة بديلة (fallback) عند أي فشل.
// السبب: localStorage قد يفشل (Safari Private Mode، quota exceeded،
// متصفحات تمنع التخزين) فيرمي استثناء يوقف التطبيق بالكامل لو لم يُمسك.

const STORAGE_PREFIX = "epp_";

/**
 * فحص توفر localStorage فعلياً (بعض البيئات تعرّفه لكنه يرمي عند الاستخدام).
 */
function isStorageAvailable() {
  try {
    const testKey = "__epp_storage_test__";
    window.localStorage.setItem(testKey, "1");
    window.localStorage.removeItem(testKey);
    return true;
  } catch {
    return false;
  }
}

const STORAGE_OK = isStorageAvailable();

/**
 * قراءة قيمة من التخزين مع تحويل JSON تلقائي.
 * @param {string} key - المفتاح (بدون البريفكس)
 * @param {*} fallback - القيمة المرجعة عند عدم وجود المفتاح أو فشل القراءة
 * @param {boolean} raw - لو true، يرجّع النص الخام بدون JSON.parse
 */
function get(key, fallback = null, raw = false) {
  if (!STORAGE_OK) return fallback;
  try {
    const item = window.localStorage.getItem(STORAGE_PREFIX + key);
    if (item === null || item === undefined) return fallback;
    if (raw) return item;
    try {
      return JSON.parse(item);
    } catch {
      // قيمة قديمة مخزّنة كنص خام (backward compat) — رجّعها كما هي
      return item;
    }
  } catch {
    return fallback;
  }
}

/**
 * كتابة قيمة في التخزين. يحاول JSON.stringify إلا لو raw=true.
 * يرجّع true لو نجح، false لو فشل (بدون رمي استثناء).
 */
function set(key, value, raw = false) {
  if (!STORAGE_OK) return false;
  try {
    const toStore = raw ? String(value) : JSON.stringify(value);
    window.localStorage.setItem(STORAGE_PREFIX + key, toStore);
    return true;
  } catch (err) {
    // QuotaExceededError أو أي خطأ آخر — لا نكسر التطبيق
    console.warn(`[storageService] فشل حفظ "${key}":`, err && err.name);
    return false;
  }
}

/**
 * حذف مفتاح. لا يرمي استثناء أبداً.
 */
function remove(key) {
  if (!STORAGE_OK) return false;
  try {
    window.localStorage.removeItem(STORAGE_PREFIX + key);
    return true;
  } catch {
    return false;
  }
}

/**
 * حذف كل مفاتيح التطبيق فقط (بالبريفكس epp_)، وليس كل localStorage
 * (حماية من حذف بيانات مواقع/تبويبات أخرى لو كان مشترك بالخطأ).
 */
function clear() {
  if (!STORAGE_OK) return false;
  try {
    const keysToRemove = [];
    for (let i = 0; i < window.localStorage.length; i++) {
      const k = window.localStorage.key(i);
      if (k && k.indexOf(STORAGE_PREFIX) === 0) keysToRemove.push(k);
    }
    keysToRemove.forEach((k) => window.localStorage.removeItem(k));
    return true;
  } catch {
    return false;
  }
}

/**
 * هل التخزين متاح فعلياً في هذه البيئة؟ (مفيد لإظهار تحذير للمستخدم)
 */
function isAvailable() {
  return STORAGE_OK;
}


const storageService = { get, set, remove, clear, isAvailable };

// ───── services/migrationService.js ─────
// ─── MIGRATION SERVICE (CRITICAL-09) ────────────────────────────────────────
// نظام إصدارات للبيانات المخزّنة محلياً، لمنع تلف بيانات قديمة بعد تحديثات
// مستقبلية على شكل الـ state. كل وصفة/تفضيلات مخزّنة تحمل "version"، ولو كانت
// قديمة (أو بدون version) يتم تمريرها على سلسلة migrations بالترتيب.

// الإصدار الحالي لشكل بيانات الوصفة الواحدة (Recipe State Shape)
const CURRENT_RECIPE_VERSION = 1;

const DEVICE_TYPES_ALLOWED = ["mtl","pod","rdl","dtl","subohm","disposable"];
const NIC_TYPES_ALLOWED    = ["freebase","salt","hybrid"];

/**
 * كل عنصر هنا يمثل خطوة ترقية من إصدار إلى الذي يليه مباشرة.
 * fromVersion: الإصدار القادم منه (undefined يُعامل كـ 0)
 * migrate(data): يرجّع نسخة جديدة من البيانات بعد الترقية
 *
 * عند إضافة شكل بيانات جديد في المستقبل: زود CURRENT_RECIPE_VERSION،
 * وأضف خطوة migration جديدة هنا. لا تُعدّل خطوات قديمة بعد نشرها.
 */
const RECIPE_MIGRATIONS = [
  {
    fromVersion: 0,
    migrate(data) {
      // ترقية من "بدون version" (الشكل الأصلي قبل هذا النظام) إلى v1.
      // لا تغييرات بنيوية مطلوبة فعلياً — فقط نضمن وجود الحقول الأساسية
      // (نفس منطق defaultedState الموجود في applyState، لكن هنا كحارس إضافي).
      return {
        ...data,
        flavors: Array.isArray(data.flavors) ? data.flavors : [],
        steepDays: data.steepDays || 0,
        customFlavDens: data.customFlavDens || {},
        // SESSION-8 backward compat: null = "use default density from NIC_SALT_DENSITIES"
        customNicDens: data.customNicDens !== undefined ? data.customNicDens : null,
        // FIX-07 (BUG-05): validateEnum بدل array مكررة — مصدر واحد للقائمة المسموحة
        deviceType: validateEnum(data.deviceType, DEVICE_TYPES_ALLOWED, "mtl"),
      };
    },
  },
  // أضف هنا: { fromVersion: 1, migrate(data) { ... } } عند الحاجة لـ v2
];

/**
 * يرقّي بيانات وصفة واحدة من أي إصدار قديم إلى CURRENT_RECIPE_VERSION.
 * آمن دائماً: لو فشلت أي خطوة، يرجّع البيانات الأصلية بدون رمي استثناء.
 */
function migrateRecipeData(data) {
  if (!data || typeof data !== "object") return data;
  try {
    let current = data;
    let version = typeof data.version === "number" ? data.version : 0;

    while (version < CURRENT_RECIPE_VERSION) {
      const step = RECIPE_MIGRATIONS.find((m) => m.fromVersion === version);
      if (!step) break; // لا توجد خطوة معروفة — توقف بأمان بدل التخمين
      current = step.migrate(current);
      version += 1;
    }

    return { ...current, version: CURRENT_RECIPE_VERSION };
  } catch (err) {
    console.warn("[migrationService] فشل ترقية بيانات الوصفة:", err);
    return data;
  }
}

/**
 * يرقّي كائن "كل الوصفات المحفوظة" بالكامل ({name: recipeState, ...}).
 */
function migrateAllRecipes(recipesObj) {
  if (!recipesObj || typeof recipesObj !== "object") return {};
  const migrated = {};
  for (const [name, recipe] of Object.entries(recipesObj)) {
    migrated[name] = migrateRecipeData(recipe);
  }
  return migrated;
}

/**
 * يضيف version للبيانات قبل الحفظ (يُستخدم في saveRecipe/getState).
 */
function withVersion(data) {
  return { ...data, version: CURRENT_RECIPE_VERSION };
}

// ─── Recipe Calculator Service (CRITICAL-12) ─────────────────────────────────
// يغلّف استدعاء qd() (محرك الحساب الأساسي في helpers.js) مع:
// - بناء flavorsWithCost من flavors الخام
// الهدف: فصل منطق "إعداد مدخلات الحساب" عن مكوّن App.
//
// ملاحظة (تنظيف كود): نظام اكتشاف OVER_TOTAL/overflowMl/requiredFlavorReductionPct
// الذي كان هنا تم حذفه — أصبح dead code بعد أن صار qd() يصحح overflow الحجم
// تلقائياً (totalExceeds100 كانت ترجع false دائماً، فالـbanner المرتبط به
// كان لا يظهر أبداً). تم تأكيد عدم وجود استخدام آخر لهذه الحقول قبل الحذف.

/**
 * يحسب نتيجة الخلطة كاملة.
 * @param {object} params - كل مدخلات الوصفة
 * @param {object} t      - كائن الترجمات (للرسائل)
 * @returns {{ res, targetMl, allWarns, flavorsWithCost }}
 */
function calculateRecipe(params, t) {
  const {
    volPreset, customVol, pgRatio, targetNic, stockStr, nicType, nicCarrierPg,
    waterPct, alcPct, pgCost, vgCost, nicCost, bottleCost,
    flavors, customPgDens, customVgDens, customFlavDens,
    customNicDens, deviceType,
  } = params;

  const targetMl = volPreset === "custom" ? customVol : volPreset;

  const flavorsWithCost = flavors.map(f => ({
    ...f,
    costPerMl: f.flavorBottleSize > 0 ? f.flavorBottlePrice / f.flavorBottleSize : 0,
    displayName: (f.emoji ? f.emoji + " " : "") + f.name,
  }));

  const res = qd({
    targetVolumeMl:     targetMl,
    pgRatio,
    nicCarrierPgRatio:  nicCarrierPg,
    targetNicStrength:  targetNic,
    nicStockStrength:   stockStr,
    nicType,
    flavors:            flavorsWithCost,
    waterPct,
    alcoholPct:         alcPct,
    pgCostPerMl:        pgCost,
    vgCostPerMl:        vgCost,
    nicCostPerMl:       nicCost,
    bottleCost,
    customPgDensity:    customPgDens,
    customVgDensity:    customVgDens,
    customFlavDensities: customFlavDens,
    customNicDensity:   customNicDens !== null && customNicDens !== undefined ? customNicDens : undefined,
    deviceType:         deviceType || "mtl",
  }, t);

  const allWarns = res.warnings;

  return { res, targetMl, allWarns, flavorsWithCost };
}

// ─── useAlarm Hook (CRITICAL-11) ─────────────────────────────────────────────
// يغلّف كل منطق منبّه التعتيق: الحالة، المؤقت الدوري، ضبط/إلغاء المنبّه.
// مستخرج من App.js للحفاظ على نظافة المكوّن الرئيسي.


/**
 * @param {object} t - كائن الترجمات الحالي (يحتوي alarmTitle, alarmMsg)
 * @returns {{ alarmDate, setAlarm, clearAlarm }}
 */
function useAlarm(t) {
  const [alarmDate, setAlarmDate] = J.useState(
    () => storageService.get("alarm_date", "", true) || ""
  );
  const alarmIntervalRef = J.useRef(null);

  J.useEffect(() => {
    if (!alarmDate) return;
    // إلغاء أي مؤقت سابق قبل إنشاء جديد
    if (alarmIntervalRef.current) {
      clearInterval(alarmIntervalRef.current);
      alarmIntervalRef.current = null;
    }
    const check = () => {
      const now = new Date();
      const target = new Date(alarmDate);
      if (now >= target) {
        // FIX (CRITICAL-05): فحص توفر Notification قبل الاستخدام
        if (
          typeof window !== "undefined" &&
          "Notification" in window &&
          window.Notification.permission === "granted"
        ) {
          new window.Notification(t.alarmTitle, {
            body: t.alarmMsg,
            icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⏰%3C/text%3E%3C/svg%3E",
          });
        } else {
          alert(t.alarmMsg);
        }
        storageService.remove("alarm_date");
        setAlarmDate("");
        clearInterval(alarmIntervalRef.current);
      }
    };
    check();
    alarmIntervalRef.current = setInterval(check, 30000);
    return () => {
      if (alarmIntervalRef.current) {
        clearInterval(alarmIntervalRef.current);
        alarmIntervalRef.current = null;
      }
    };
  }, [alarmDate, t]);

  const setAlarm = (readyDate) => {
    const d = readyDate.toISOString();
    storageService.set("alarm_date", d, true);
    setAlarmDate(d);
    // FIX (CRITICAL-05): فحص توفر Notification
    if (
      typeof window !== "undefined" &&
      "Notification" in window &&
      window.Notification.permission === "default"
    ) {
      // FIX (BUG-14): نتيجة requestPermission لم تكن تُعالَج سابقاً — لو رفض
      // المستخدم الإذن، لا يعرف بذلك إلا بعد أيام عند انتهاء النقيع. الآن
      // نُعلِمه فوراً بـ toast أن المنبه سيظهر كتنبيه داخل التطبيق بدلاً
      // من إشعار النظام.
      window.Notification.requestPermission()?.then?.((permission) => {
        if (permission === "denied") {
          showToast(t?.notifPermissionDenied || "🔕 Notification permission denied", "info");
        }
      });
    }
  };

  const clearAlarm = () => {
    storageService.remove("alarm_date");
    setAlarmDate("");
    if (alarmIntervalRef.current) clearInterval(alarmIntervalRef.current);
  };

  return { alarmDate, setAlarm, clearAlarm };
}

// ─── useDraft Hook (CRITICAL-11 / CRITICAL-02/03/04) ────────────────────────
// يغلّف منطق الحفظ التلقائي (auto-save) واسترجاع المسودة (draft recovery).
// مستخرج من App.js.


const DRAFT_KEY    = "draft_recipe";
const DRAFT_TS_KEY = "draft_ts";

/**
 * @param {Function} getState  - دالة تُرجع snapshot كامل للـ state الحالي
 * @param {Function} applyState - دالة تُطبق snapshot محفوظ على الـ state
 * @param {Array}    watchDeps  - مصفوفة المتغيرات التي تُطلق الحفظ عند تغيّرها
 * @returns {{ showDraftBanner, restoreDraft, discardDraft }}
 */
function useDraft(getState, applyState, watchDeps) {
  const [showDraftBanner, setShowDraftBanner] = J.useState(false);

  // فحص وجود draft عند أول تحميل
  J.useEffect(() => {
    const saved = storageService.get(DRAFT_KEY, null);
    if (saved && typeof saved === "object" && saved.flavors) {
      setShowDraftBanner(true);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Auto-save بـ debounce 30 ثانية
  const autoSaveRef = J.useRef(null);
  J.useEffect(() => {
    if (autoSaveRef.current) clearTimeout(autoSaveRef.current);
    autoSaveRef.current = setTimeout(() => {
      const draft = getState();
      storageService.set(DRAFT_KEY, withVersion(draft));
      storageService.set(DRAFT_TS_KEY, Date.now().toString(), true);
    }, 30000);
    return () => { if (autoSaveRef.current) clearTimeout(autoSaveRef.current); };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, watchDeps);

  const restoreDraft = () => {
    const saved = storageService.get(DRAFT_KEY, null);
    if (saved) {
      try { applyState(migrateRecipeData(saved)); }
      catch (e) { console.warn("[useDraft] فشل استرجاع المسودة", e); }
    }
    setShowDraftBanner(false);
  };

  const discardDraft = () => {
    storageService.remove(DRAFT_KEY);
    storageService.remove(DRAFT_TS_KEY);
    setShowDraftBanner(false);
  };

  /** يُمسح بعد حفظ ناجح — FIX-06 (BUG-06): يُلغي المؤقّت المعلَّق أولاً
   *  لمنع ظهور بانر "مسودة" زائف لو كان autosave مجدولاً بعد ثوانٍ */
  const clearDraft = () => {
    if (autoSaveRef.current) {
      clearTimeout(autoSaveRef.current);
      autoSaveRef.current = null;
    }
    storageService.remove(DRAFT_KEY);
    storageService.remove(DRAFT_TS_KEY);
  };

  return { showDraftBanner, restoreDraft, discardDraft, clearDraft };
}

const addFlavor = J.useCallback(() => setFlavors(w => {

    // FIX-01: نحاول استنتاج إيموجي من الاسم الافتراضي (نادراً ما يطابق شيئاً
    // فعلياً لأنه نص عام "New Flavor"/"نكهة جديدة")، فنقع على
    // DEFAULT_FLAVOR_EMOJI (FIX-05) كنفس السلوك القديم. _emojiManual:false
    // يسمح لاحقاً لـ updateFlavorV بتحديث الإيموجي تلقائياً عند تغيير الاسم،
    // إلى أن يختار المستخدم إيموجي يدوياً بنفسه من EmojiPicker.
    return [
      ...w,
      {id:Date.now(),name:defaultName,mfr:"TPA/TFA",
       pct:5,pgRatio:1,flavorBottlePrice:80,flavorBottleSize:30,
       emoji:flavorEmojiOrDefault(inferFlavorEmoji(defaultName)),
       _emojiManual:false}
    ];
  }), [t]);
  const deleteFlavor = J.useCallback((id) => {
    if (window.confirm(t?.confirmDeleteFlavor || "Delete flavor?"))
      setFlavors(w => w.filter(f => f.id !== id));
  }, [t]);
  const updateFlavor = J.useCallback((id, key, val) =>
    setFlavors(w => w.map(f => f.id === id ? {...f, [key]: val} : f)), []);
  // FIX-01: عند اختيار المستخدم إيموجي يدوياً من EmojiPicker، نُعلِّم النكهة
  // بـ_emojiManual:true في نفس التحديث (عملية واحدة) حتى لا يستبدله
  // inferFlavorEmoji التلقائي لاحقاً عند تعديل الاسم.
  const setFlavorEmojiManual = J.useCallback((id, emoji) =>
    setFlavors(w => w.map(f => f.id === id ? {...f, emoji, _emojiManual:true} : f)), []);

  const applyPgPreset = J.useCallback((pr) => { setPgPreset(pr.label); setPgRatio(pr.pg); }, []);

  // ── Validated setters (CRITICAL-07) ─────────────────────────────────────────
  // كل هذه الدوال تستدعي فقط raw setState (مستقر) + دوال validators نقية
  // مستوردة على مستوى الموديول (مستقرة أيضاً) → deps=[] صحيحة ودائمة.
  const setTargetNicV   = J.useCallback((v) => setTargetNic(validatePercentage(v, {min:0, max:60, fallback:0})), []);
  const setStockStrV    = J.useCallback((v) => setStockStr(validateNumber(v, {min:0, max:1000, fallback:72})), []);
  const setPgRatioV     = J.useCallback((v) => setPgRatio(validatePercentage(v, {min:0, max:100, fallback:30}) / 100), []);
  const setCustomVolV   = J.useCallback((v) => setCustomVol(validateVolume(v, {max:10000, fallback:100})), []);
  const setWaterPctV    = J.useCallback((v) => setWaterPct(validatePercentage(v, {min:0, max:10, fallback:0})), []);
  const setAlcPctV      = J.useCallback((v) => setAlcPct(validatePercentage(v, {min:0, max:10, fallback:0})), []);
  const setPgBottlePriceV = J.useCallback((v) => setPgBottlePrice(validatePrice(v, {fallback:0})), []);
  const setPgBottleSizeV  = J.useCallback((v) => setPgBottleSize(validateVolume(v, {max:10000, fallback:1000}) || 1), []);
  const setVgBottlePriceV = J.useCallback((v) => setVgBottlePrice(validatePrice(v, {fallback:0})), []);
  const setVgBottleSizeV  = J.useCallback((v) => setVgBottleSize(validateVolume(v, {max:10000, fallback:1000}) || 1), []);
  const setNicBottlePriceV = J.useCallback((v) => setNicBottlePrice(validatePrice(v, {fallback:0})), []);
  const setNicBottleSizeV  = J.useCallback((v) => setNicBottleSize(validateVolume(v, {max:500, fallback:30}) || 1), []);
  const setBottleCostV  = J.useCallback((v) => setBottleCost(validatePrice(v, {fallback:0})), []);
  const updateFlavorV = J.useCallback((id, key, val) => {
    if (key === "pct")              val = validatePercentage(val, {min:0, max:30, fallback:5});
    else if (key === "pgRatio")     val = validatePercentage(val, {min:0, max:100, fallback:100}) / 100;
    else if (key === "flavorBottlePrice") val = validatePrice(val, {fallback:0});
    else if (key === "flavorBottleSize")  val = validateVolume(val, {max:1000, fallback:30}) || 1;
    else if (key === "name") {
      val = validateText(val, {maxLength:60, fallback:""});
      // FIX-01: تحديث الإيموجي تلقائياً مع تغيير الاسم يدوياً، فقط لو المستخدم
      // لم يختر إيموجي بنفسه من قبل (_emojiManual). هذا يحافظ على اختيار
      // المستخدم اليدوي من EmojiPicker (أو من كتالوج الشركة) ولا يلغيه أبداً.
      setFlavors(w => w.map(f => {
        if (f.id !== id) return f;
        const next = {...f, name: val};
        if (!f._emojiManual) {
          const inferred = inferFlavorEmoji(val);
          if (inferred) next.emoji = inferred;
        }
        return next;
      }));
      return;
    }
    updateFlavor(id, key, val);
  }, [updateFlavor]);
  // SESSION-8: validated setter for customNicDens (0.9–1.2 g/mL, null = default)
  const setCustomNicDensV = J.useCallback((v) => {
    const n = validateNumber(v, {min:0.9, max:1.2, fallback:1.01});
    setCustomNicDens(n);
  }, []);

  // FIX-03 (BUG-01): validated setters لكثافات PG/VG/النكهات — نفس نمط setCustomNicDensV
  // لمنع إدخال كثافات غير منطقية تُنتج أوزاناً خاطئة في وضع العرض بالوزن
  const setCustomPgDensV = J.useCallback((v) => {
    setCustomPgDens(validateNumber(v, {min:0.9, max:1.2, fallback:1.036}));
  }, []);
  const setCustomVgDensV = J.useCallback((v) => {
    setCustomVgDens(validateNumber(v, {min:1.1, max:1.4, fallback:1.261}));
  }, []);
  const setCustomFlavDensV = J.useCallback((id, v) => {
    const val = validateNumber(v, {min:0.9, max:1.4, fallback:1.036});
    setCustomFlavDens(prev => ({...prev, [id]: val}));
  }, []);

  // ── State snapshot ──────────────────────────────────────────────────────────
  const getState = () => ({
    volPreset, customVol, pgRatio, pgPreset, targetNic, stockStr,
    nicType, nicCarrierPg, waterPct, alcPct,
    pgBottlePrice, pgBottleSize, vgBottlePrice, vgBottleSize,
    nicBottlePrice, nicBottleSize, bottleCost,
    flavors, customPgDens, customVgDens, customFlavDens,
    customNicDens, deviceType,
    steepDays, mixedOn: new Date().toISOString().slice(0, 10),
  });

  // ── Apply state (load) ──────────────────────────────────────────────────────

  // FIX-04 (BUG-02): sanitizeRecipeState — طبقة تحقق واحدة تحمي كل مسارات
  // تحميل الـstate (applyState, importJson, restoreAll, useDraft).
  // تُعيد نسخة آمنة 100% بعد تمرير كل حقل رقمي عبر validators المناسبة،
  // لمنع NaN/Infinity/قيم سالبة/ضخمة من الوصول للـstate عبر raw setters.
  // يُنشئ فقط حقولاً موجودة في المصدر (لا يُضيف حقولاً غائبة كي لا يكسر backward compat).
  const sanitizeRecipeState = (ds) => {
    // FIX-07 (BUG-05): نستخدم DEVICE_TYPES_ALLOWED / NIC_TYPES_ALLOWED المركزية + validateEnum
    const out = {...ds};
    if (ds.customVol    !== undefined) out.customVol    = validateVolume(ds.customVol, {max:10000, fallback:100});
    if (ds.pgRatio      !== undefined) out.pgRatio      = validatePercentage(ds.pgRatio * 100, {min:0, max:100, fallback:30}) / 100;
    if (ds.targetNic    !== undefined) out.targetNic    = validatePercentage(ds.targetNic, {min:0, max:60, fallback:0});
    if (ds.stockStr     !== undefined) out.stockStr     = validateNumber(ds.stockStr, {min:0, max:1000, fallback:72});
    if (ds.nicCarrierPg !== undefined) out.nicCarrierPg = validatePercentage(ds.nicCarrierPg * 100, {min:0, max:100, fallback:100}) / 100;
    if (ds.waterPct     !== undefined) out.waterPct     = validatePercentage(ds.waterPct, {min:0, max:10, fallback:0});
    if (ds.alcPct       !== undefined) out.alcPct       = validatePercentage(ds.alcPct, {min:0, max:10, fallback:0});
    if (ds.pgBottlePrice  !== undefined) out.pgBottlePrice  = validatePrice(ds.pgBottlePrice, {fallback:0});
    if (ds.pgBottleSize   !== undefined) out.pgBottleSize   = validateVolume(ds.pgBottleSize, {max:10000, fallback:1000}) || 1;
    if (ds.vgBottlePrice  !== undefined) out.vgBottlePrice  = validatePrice(ds.vgBottlePrice, {fallback:0});
    if (ds.vgBottleSize   !== undefined) out.vgBottleSize   = validateVolume(ds.vgBottleSize, {max:10000, fallback:1000}) || 1;
    if (ds.nicBottlePrice !== undefined) out.nicBottlePrice = validatePrice(ds.nicBottlePrice, {fallback:0});
    if (ds.nicBottleSize  !== undefined) out.nicBottleSize  = validateVolume(ds.nicBottleSize, {max:500, fallback:30}) || 1;
    if (ds.bottleCost   !== undefined) out.bottleCost   = validatePrice(ds.bottleCost, {fallback:0});
    if (ds.steepDays    !== undefined) out.steepDays    = validateNumber(ds.steepDays, {min:0, max:365, fallback:0});
    if (ds.nicType      !== undefined) out.nicType      = validateEnum(ds.nicType, NIC_TYPES_ALLOWED, "freebase");
    if (ds.deviceType   !== undefined) out.deviceType   = validateEnum(ds.deviceType, DEVICE_TYPES_ALLOWED, "mtl");
    // customNicDens: null = use default (مقصود), رقم = كثافة مخصصة
    if (ds.customNicDens !== undefined && ds.customNicDens !== null)
      out.customNicDens = validateNumber(ds.customNicDens, {min:0.9, max:1.2, fallback:1.01});
    if (ds.customPgDens !== undefined)
      out.customPgDens = validateNumber(ds.customPgDens, {min:0.9, max:1.2, fallback:1.036});
    if (ds.customVgDens !== undefined)
      out.customVgDens = validateNumber(ds.customVgDens, {min:1.1, max:1.4, fallback:1.261});
    // customFlavDens: object { [id]: density }
    if (ds.customFlavDens && typeof ds.customFlavDens === "object") {
      const sanitized = {};
      for (const [id, v] of Object.entries(ds.customFlavDens))
        sanitized[id] = validateNumber(v, {min:0.9, max:1.4, fallback:1.036});
      out.customFlavDens = sanitized;
    }
    // flavors array: تحقق من كل حقل رقمي داخل كل نكهة
    if (Array.isArray(ds.flavors)) {
      out.flavors = ds.flavors.map(f => ({
        ...f,
        pct:              validatePercentage(f.pct, {min:0, max:30, fallback:5}),
        pgRatio:          validatePercentage((f.pgRatio ?? 1) * 100, {min:0, max:100, fallback:100}) / 100,
        flavorBottlePrice: validatePrice(
          f.flavorBottlePrice !== undefined ? f.flavorBottlePrice : (f.costPerMl ? f.costPerMl * 30 : 80),
          {fallback:0}
        ),
        flavorBottleSize: validateVolume(f.flavorBottleSize || 30, {max:1000, fallback:30}) || 1,
        emoji:            flavorEmojiOrDefault(f.emoji),
        _emojiManual:     f._emojiManual !== undefined ? f._emojiManual : true,
      }));
    }
    return out;
  };

  const applyState = (s) => {
    // FIX-04 (BUG-02): تمرير الـstate عبر sanitizeRecipeState أولاً قبل أي setter
    // يحمي من JSON تالف / localStorage تالف / ملف معدَّل يدوياً
    const raw = {
      ...s,
      mixedOn:        s.mixedOn || new Date().toISOString().slice(0, 10),
      steepDays:      s.steepDays !== undefined ? s.steepDays : 0,
      customFlavDens: s.customFlavDens || {},
    };
    const ds = sanitizeRecipeState(raw);

    if (ds.volPreset    !== undefined) setVolPreset(ds.volPreset);
    if (ds.customVol    !== undefined) setCustomVol(ds.customVol);
    if (ds.pgRatio      !== undefined) setPgRatio(ds.pgRatio);
    if (ds.pgPreset     !== undefined) setPgPreset(ds.pgPreset);
    if (ds.targetNic    !== undefined) setTargetNic(ds.targetNic);
    if (ds.stockStr     !== undefined) setStockStr(ds.stockStr);
    // nicType محقَّق بالفعل في sanitizeRecipeState
    setNicType(ds.nicType || "freebase");
    if (ds.nicCarrierPg !== undefined) setNicCarrierPg(ds.nicCarrierPg);
    if (ds.waterPct     !== undefined) setWaterPct(ds.waterPct);
    if (ds.alcPct       !== undefined) setAlcPct(ds.alcPct);
    if (ds.pgBottlePrice  !== undefined) setPgBottlePrice(ds.pgBottlePrice);
    if (ds.pgBottleSize   !== undefined) setPgBottleSize(ds.pgBottleSize);
    if (ds.vgBottlePrice  !== undefined) setVgBottlePrice(ds.vgBottlePrice);
    if (ds.vgBottleSize   !== undefined) setVgBottleSize(ds.vgBottleSize);
    if (ds.nicBottlePrice !== undefined) setNicBottlePrice(ds.nicBottlePrice);
    if (ds.nicBottleSize  !== undefined) setNicBottleSize(ds.nicBottleSize);
    if (ds.bottleCost   !== undefined) setBottleCost(ds.bottleCost);
    if (ds.flavors      !== undefined) setFlavors(ds.flavors);
    if (ds.customPgDens   !== undefined) setCustomPgDens(ds.customPgDens);
    if (ds.customVgDens   !== undefined) setCustomVgDens(ds.customVgDens);
    if (ds.customFlavDens !== undefined) setCustomFlavDens(ds.customFlavDens);
    // SESSION-8: backward compat — null means "use default density"
    if (ds.customNicDens  !== undefined) setCustomNicDens(ds.customNicDens);
    else setCustomNicDens(null);
    // deviceType محقَّق بالفعل في sanitizeRecipeState
    setDeviceType(ds.deviceType || "mtl");
    if (ds.steepDays !== undefined) setSteepDays(ds.steepDays);
    if (ds.mixedOn   !== undefined) setMixedOn(ds.mixedOn);
  };

  // ── Persistence actions ─────────────────────────────────────────────────────
  const saveRecipe = () => {
    const name = window.prompt(t?.recipeName || "Recipe name:", recipeName || "My Recipe");
    if (!name) return;
    setRecipeName(name);
    const existing = migrateAllRecipes(storageService.get("recipes", {}));
    existing[name] = withVersion({...getState(), mixedOn: new Date().toISOString().slice(0, 10)});
    const saved = storageService.set("recipes", existing);
    if (!saved) showToast(t?.saveFailed || "⚠️ Save failed", "error");
    if (saved && clearDraft) clearDraft();
  };

  const exportJson = () => {
    const blob = new Blob([JSON.stringify(getState(), null, 2)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "epp-recipe.json";
    a.click();
  };

  const importJson = () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = ".json";
    inp.onchange = e => {
      const f = e.target.files[0];
      if (!f) return;
      const rd = new FileReader();
      rd.onload = ev => {
        try { applyState(migrateRecipeData(JSON.parse(ev.target.result))); }
        catch { alert("Invalid JSON"); }
      };
      rd.readAsText(f);
    };
    inp.click();
  };

  const backupAll = (currentLang, currentTheme) => {
    const recipes = storageService.get("recipes", {});
    const backup = {
      _type: "epp_full_backup",
      _version: 1,
      _date: new Date().toISOString(),
      settings: {lang: currentLang, theme: currentTheme},
      recipes: migrateAllRecipes(recipes),
      current: withVersion(getState()),
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `epp-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    showToast(t?.backupSuccess || "✅ Full backup exported!", "success");
  };

  const restoreAll = (setLang) => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = ".json";
    inp.onchange = e => {
      const f = e.target.files[0];
      if (!f) return;
      const rd = new FileReader();
      rd.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data || data._type !== "epp_full_backup") {
            showToast(t?.restoreFailed || "❌ Invalid backup file", "error");
            return;
          }
          if (data.recipes && typeof data.recipes === "object")
            storageService.set("recipes", migrateAllRecipes(data.recipes));
          if (data.current && typeof data.current === "object")
            applyState(migrateRecipeData(data.current));
          if (data.settings?.lang && setLang) setLang(data.settings.lang);
          showToast(t?.restoreSuccess || "✅ Backup restored!", "success");
        } catch (err) {
          console.error("[restoreAll]", err);
          showToast(t?.restoreFailed || "❌ Invalid backup file", "error");
        }
      };
      rd.readAsText(f);
    };
    inp.click();
  };

  // ── watchDeps للـ useDraft ──────────────────────────────────────────────────
  const draftWatchDeps = [
    volPreset, customVol, pgRatio, targetNic, stockStr, nicType, nicCarrierPg,
    waterPct, alcPct, pgBottlePrice, pgBottleSize, vgBottlePrice, vgBottleSize,
    nicBottlePrice, nicBottleSize, bottleCost, flavors,
    customPgDens, customVgDens, customFlavDens, steepDays,
    customNicDens, deviceType,
  ];

  return {
    // state
    volPreset, setVolPreset,
    customVol,
    pgRatio, setPgRatio,
    pgPreset, setPgPreset,
    targetNic, setTargetNic,
    stockStr, setStockStr,
    nicType, setNicType,
    nicCarrierPg, setNicCarrierPg,
    waterPct, setWaterPct,
    alcPct, setAlcPct,
    pgBottlePrice, pgBottleSize,
    vgBottlePrice, vgBottleSize,
    nicBottlePrice, nicBottleSize,
    bottleCost,
    pgCost, vgCost, nicCost,
    flavors, setFlavors,
    display, setDisplay,
    customPgDens, setCustomPgDens,
    customVgDens, setCustomVgDens,
    customFlavDens, setCustomFlavDens,
    // SESSION-8: customNicDens & deviceType
    customNicDens, setCustomNicDens, setCustomNicDensV,
    deviceType, setDeviceType,
    steepDays, setSteepDays,
    mixedOn, setMixedOn,
    recipeName, setRecipeName,
    // flavor helpers
    addFlavor, deleteFlavor, updateFlavor, setFlavorEmojiManual, brandCatalogFor, setBrandCatalogFor,
    applyPgPreset,
    // validated setters
    setTargetNicV, setStockStrV, setPgRatioV, setCustomVolV,
    setWaterPctV, setAlcPctV,
    setPgBottlePriceV, setPgBottleSizeV,
    setVgBottlePriceV, setVgBottleSizeV,
    setNicBottlePriceV, setNicBottleSizeV,
    setBottleCostV, updateFlavorV,
    setCustomNicDensV,
    // FIX-03 (BUG-01): validated density setters for PG/VG/flavors
    setCustomPgDensV, setCustomVgDensV, setCustomFlavDensV,
    // actions
    getState, applyState,
    saveRecipe, exportJson, importJson,
    backupAll, restoreAll,
    // for useDraft
    draftWatchDeps,
  };
}
// ─── COMMON UI COMPONENTS ────────────────────────────────────────────────────
// ToastContainer, labels/inputs/cards, warning banner, ingredient row (qt) and
// the simple confirmation dialog.
// CRITICAL-16: المكوّنات التقديمية البسيطة (le/ao/He/ct/Lt/WarnBanner/qt/
// ConfirmDialog) تُغلَّف بـ J.memo — تُستخدم بكثافة (عشرة+ مرة لكل تصيير في
// تبويب واحد) وبروبس عناصرها غالباً بدائية (أرقام/نصوص) أو دوال مُستقرّة
// الهوية بعد CRITICAL-16 في useRecipeState.js (useCallback)، فالمقارنة
// السطحية الافتراضية لـ J.memo تتجنّب إعادة بناء هذه العناصر بلا داعٍ عند أي
// تغيير حالة لا يخصّها (فتح/إغلاق نافذة، تبديل تبويب، تبديل الثيم...).
// CRITICAL-17: aria-label على الأزرار التي تعرض أيقونة/رمزاً فقط بدون نص
// مرئي (✓/✕)، و role="alert" على تحذيرات الخطأ لقارئات الشاشة.



function ToastContainer(){
  const[toasts,setToasts]=J.useState([]);
  J.useEffect(()=>{
    const fn=(t)=>{
      setToasts(prev=>[...prev,t]);
      setTimeout(()=>setToasts(prev=>prev.filter(x=>x.id!==t.id)),t.duration||3000);
    };
    _toastListeners.add(fn);
    return()=>_toastListeners.delete(fn);
  },[]);
  const colors={success:S.green,error:S.red,info:S.accent,warning:S.yellow};
  return p.jsx("div",{
    style:{position:"fixed",top:20,right:20,zIndex:9999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"},
    role:"status","aria-live":"polite",
    children:
    toasts.map(t=>p.jsxs("div",{key:t.id,style:{
      background:S.card,border:`1px solid ${colors[t.type]||S.border}`,
      color:S.text,borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:600,
      boxShadow:`0 4px 20px rgba(0,0,0,0.4)`,minWidth:200,
      borderLeft:`4px solid ${colors[t.type]||S.accent}`,
      animation:"slideIn 0.3s ease"
    },children:[
      p.jsx("span",{style:{marginLeft:8},children:t.type==="success"?"✅":t.type==="error"?"❌":t.type==="warning"?"⚠️":"ℹ️"}),
      t.msg
    ]},t.id))
  });
}

// ───── components/SteepTimer.js ─────
// ─── STEEPING TIMER ──────────────────────────────────────────────────────────
// CRITICAL-16: J.memo — يُعاد حسابه على كل Date() في كل تصيير لـ App.js وإن
// لم تتغيّر steepDays/mixedOn/alarmDate؛ المقارنة السطحية تتجنّب ذلك.


const SteepTimer=J.memo(function SteepTimer({t,steepDays,mixedOn,alarmDate,onSetAlarm,onClearAlarm}){
  if(!steepDays||!mixedOn) return null;
  const mixed=new Date(mixedOn);
  if(isNaN(mixed.getTime())) return null; // mixedOn تاريخ فاسد (مثلاً من JSON مستورد تالف) — تجاهل بأمان بدل عرض NaN/Invalid Date
  const today=new Date();
  const elapsed=Math.floor((today-mixed)/(1000*60*60*24));
  const remaining=steepDays-elapsed;
  const readyDate=new Date(mixed.getTime()+steepDays*86400000);
  const readyStr=readyDate.toLocaleDateString("ar-EG",{year:"numeric",month:"long",day:"numeric"});
  const done=remaining<=0;
  const hasAlarm=!!alarmDate;
  // Progress bar
  // FIX (BUG-12): حماية من remaining سالب (مثلاً تاريخ mixedOn في المستقبل
  // بسبب خطأ إدخال أو فرق توقيت) — Math.min كان يحدّ الحد الأعلى فقط، فكانت
  // pct تنتج قيمة سالبة (width سالب CSS + aria-valuenow غير صالح). الآن نحصر
  // pct بين 0 و100 دائماً.
  const pct=Math.max(0,Math.min(100,Math.round(((steepDays-remaining)/steepDays)*100)));
  return p.jsxs("div",{style:{background:S.surface,border:`2px solid ${done?S.green:hasAlarm?"#f59e0b":S.border}`,borderRadius:10,padding:"12px 14px",marginTop:8,fontSize:12},children:[
    p.jsxs("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8},children:[
      p.jsxs("div",{children:[
        p.jsxs("div",{style:{color:S.muted,marginBottom:2},children:[t.mixedOn," ",mixed.toLocaleDateString("ar-EG")]}),
        p.jsxs("div",{style:{color:S.dimmed},children:[t.steepingReady," ",readyStr]})
      ]}),
      p.jsx("div",{"aria-hidden":"true",style:{fontSize:28,lineHeight:1},children:done?"🎉":"🧪"})
    ]}),
    p.jsx("div",{role:"progressbar","aria-valuenow":pct,"aria-valuemin":0,"aria-valuemax":100,style:{height:8,background:done?`${S.green}30`:"rgba(255,255,255,0.08)",borderRadius:4,overflow:"hidden",marginBottom:8},children:
      p.jsx("div",{style:{width:`${pct}%`,height:"100%",background:done?S.green:`linear-gradient(90deg,${S.accent},#f59e0b)`,borderRadius:4,transition:"width 0.5s"}})
    }),
    p.jsxs("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"},children:[
      p.jsx("div",{style:{color:done?S.green:S.yellow,fontWeight:700,fontSize:13},children:done?t.steepingDone:t.steepingRemaining(remaining)}),
      !done&&p.jsx("button",{
        onClick:()=>hasAlarm?onClearAlarm():onSetAlarm(readyDate),
        "aria-label":hasAlarm?t.alarmClear:t.alarmSet,
        style:{padding:"4px 10px",borderRadius:6,border:`1px solid ${hasAlarm?"#ef4444":"#f59e0b"}`,background:"transparent",color:hasAlarm?"#ef4444":"#f59e0b",cursor:"pointer",fontSize:11,fontWeight:600},
        children:hasAlarm?t.alarmClear:t.alarmSet
      })
    ]}),
    hasAlarm&&p.jsxs("div",{style:{marginTop:6,fontSize:11,color:"#f59e0b",display:"flex",alignItems:"center",gap:4},children:["⏰ ",t.alarmActive," — ",new Date(alarmDate).toLocaleDateString("ar-EG")]})
  ]})
});


// ───── components/RecipeChart.js ─────
// ── RECIPE CHART (doughnut chart via Chart.js, loaded globally as window.Chart) ─
// CRITICAL-16: مُغلَّف بـ J.memo — رسم Chart.js مكلف (DOM canvas + مكتبة خارجية)
// ولا يجب إعادة بنائه إلا عند تغيّر res/lang/t فعلياً.


const RecipeChart=J.memo(function RecipeChart({res,t,lang}){
  const canvasRef=J.useRef(null);
  const chartRef=J.useRef(null);
  // FIX: إعادة حساب الرسم البياني فقط عند تغيير البيانات الفعلية، لا عند كل تغيير في res
  const chartDataKey=J.useMemo(()=>JSON.stringify({
    pgMl:res.pg?.ml,
    vgMl:res.vg?.ml,
    nicMl:res.nicotine?.ml,
    flavorsMl:res.flavors.map(f=>({n:f.name,ml:f.ml}))
  }),[res]);
  // CRITICAL-17: وصف نصي مكافئ للرسم البياني — Chart.js يرسم على <canvas> غير
  // مقروء لقارئات الشاشة، فنزوّد ملخصاً نصياً عبر aria-label.
  const chartAriaLabel=J.useMemo(()=>{
    const parts=[`PG ${res.pg?.ml||0}ml`,`VG ${res.vg?.ml||0}ml`];
    if(res.nicotine?.ml>0) parts.push(`Nicotine ${res.nicotine.ml}ml`);
    res.flavors.filter(f=>f.ml>0).forEach(f=>parts.push(`${f.name} ${f.ml}ml`));
    const prefix=lang==="ar"?"رسم بياني لتوزيع المكونات: ":"Composition chart: ";
    return prefix+parts.join(", ");
  },[res,lang]);
  J.useEffect(()=>{
    if(!canvasRef.current||!window.Chart)return;
    if(chartRef.current){chartRef.current.destroy();}
    // BUG-06 follow-up: إيموجي كل نكهة كبادئة لاسمها في legend/tooltip الرسم
    // البياني — يفيد بصرياً في تمييز شرائح الدونات بسرعة. PG/VG/Nicotine لا
    // تملك إيموجي فتبقى كما هي.
    const flavLabels=res.flavors.filter(f=>f.ml>0).map(f=>`${flavorEmojiOrDefault(f.emoji)} ${f.name}`);
    const flavVals=res.flavors.filter(f=>f.ml>0).map(f=>f.ml);
    const nicMl=res.nicotine?.ml||0;
    // FIX (BUG-19): الفلترة السابقة كانت تعتمد على فهرسة labels بعد filter(Boolean)
    // لاستبعاد قيم vals المقابلة — وهذا يفترض أن طول المصفوفتين يبقى متطابقاً
    // بعد الفلترة، وهو افتراض هش (يصمد فقط بالصدفة لأن "PG"/"VG" نصوص ثابتة
    // الصحة دائماً). الحل الصحيح: نبني زوج [label,value] لكل شريحة، ثم نفلتر
    // الأزواج معاً بناءً على القيمة فعلياً (>0) — هذا يضمن التطابق دائماً
    // ويُصحّح أيضاً حالة الحافة 0ml (مثلاً PG=0 أو VG=0 في خلطة تعتمد كلياً
    // على ماء/كحول) بحيث لا تظهر شرائح وهمية بقيمة صفر في الرسم البياني.
    const pgMl=res.pg?.ml||0, vgMl=res.vg?.ml||0;
    const allPairs=[
      ["PG",pgMl],["VG",vgMl],
      ...flavLabels.map((lbl,i)=>[lbl,flavVals[i]]),
      ["Nicotine",nicMl]
    ].filter(([,val])=>val>0);
    const labels=allPairs.map(([lbl])=>lbl);
    const vals=allPairs.map(([,val])=>val);
    const colors=["#60a5fa","#34d399","#f59e0b","#fb923c","#e879f9","#38bdf8","#a78bfa","#fbbf24"];
    chartRef.current=new window.Chart(canvasRef.current,{
      type:"doughnut",
      data:{
        labels,
        datasets:[{data:vals,backgroundColor:colors.slice(0,labels.length),borderWidth:2,borderColor:S.card}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{position:"bottom",labels:{color:S.text,font:{size:11},padding:8}},
          tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw?.toFixed?.(1)}ml`}}
        }
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[chartDataKey]);
  return p.jsxs("div",{style:{background:S.card,border:`1px solid ${S.border}`,borderRadius:12,padding:14,marginBottom:14},children:[
    p.jsxs("div",{style:{fontSize:12,fontWeight:700,color:S.accent,marginBottom:10},children:["📊 ",(lang==="ar"?"توزيع المكونات":"Composition Chart")]}),
    p.jsx("div",{style:{height:200,position:"relative"},children:
      p.jsx("canvas",{ref:canvasRef,role:"img","aria-label":chartAriaLabel})
    })
  ]});
});

// ── RECIPE CARD MODAL — صورة كاملة (QR + تفاصيل الخلطة) قابلة للحفظ ─────────
// يرسم بطاقة PNG على <canvas> تحتوي على:
//   - اسم الخلطة + تاريخ الخلط
//   - QR code (مكتبة QRCode.js عبر canvas مؤقت)
//   - PG / VG / Nicotine / Volume
//   - قائمة النكهات بالنسب والـ ml
//   - التكلفة الإجمالية
//   - شعار EPP

// ── Polyfill: CanvasRenderingContext2D.roundRect (Safari < 15.4) ──────────────
if(typeof CanvasRenderingContext2D!=="undefined"&&!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const R=typeof r==="number"?{upperLeft:r,upperRight:r,lowerRight:r,lowerLeft:r}:
      Array.isArray(r)?{upperLeft:r[0]||0,upperRight:r[1]||0,lowerRight:r[2]||0,lowerLeft:r[3]||0}:
      Object.assign({upperLeft:0,upperRight:0,lowerRight:0,lowerLeft:0},r||{});
    this.beginPath();
    this.moveTo(x+R.upperLeft,y);
    this.lineTo(x+w-R.upperRight,y);
    this.quadraticCurveTo(x+w,y,x+w,y+R.upperRight);
    this.lineTo(x+w,y+h-R.lowerRight);
    this.quadraticCurveTo(x+w,y+h,x+w-R.lowerRight,y+h);
    this.lineTo(x+R.lowerLeft,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-R.lowerLeft);
    this.lineTo(x,y+R.upperLeft);
    this.quadraticCurveTo(x,y,x+R.upperLeft,y);
    this.closePath();
  };
}

// ── مساعد: تحويل hex → rgb ───────────────────────────────────────────────────
function _hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ── مساعد: رسم QR على canvas مؤقت وإرجاعه كـ ImageBitmap/Image ──────────────
function _buildQRImage(text,size){
  return new Promise((resolve,reject)=>{
    if(!window.QRCode){reject(new Error("QRCode not loaded"));return;}
    const div=document.createElement("div");
    div.style.position="absolute";
    div.style.left="-9999px";
    document.body.appendChild(div);
    try{
      new window.QRCode(div,{text:text||"EPP",width:size,height:size,colorDark:"#0b1120",colorLight:"#ffffff"});
      // QRCode.js يولّد <img> بعد لحظة — ننتظر onload
      const img=div.querySelector("img");
      if(img){
        if(img.complete){
          document.body.removeChild(div);
          resolve(img);
        } else {
          img.onload=()=>{document.body.removeChild(div);resolve(img);};
          img.onerror=()=>{document.body.removeChild(div);reject(new Error("QR img error"));};
        }
      } else {
        // بعض الإصدارات تولّد canvas مباشرة
        const c=div.querySelector("canvas");
        document.body.removeChild(div);
        resolve(c||null);
      }
    }catch(e){
      try{document.body.removeChild(div);}catch{}
      reject(e);
    }
  });
}

// ── مساعد: تقسيم النص الطويل إلى أسطر ──────────────────────────────────────
function _wrapText(ctx,text,maxWidth){
  const words=text.split(" ");
  const lines=[];
  let line="";
  for(const w of words){
    const test=line?line+" "+w:w;
    if(ctx.measureText(test).width>maxWidth&&line){
      lines.push(line);
      line=w;
    } else {
      line=test;
    }
  }
  if(line) lines.push(line);
  return lines;
}

// ── المكوّن الرئيسي ───────────────────────────────────────────────────────────
const QRModal=J.memo(function RecipeCardModal({data,onClose,lang,recipeName,res,flavors,mixedOn,fmtEGP}){
  const canvasRef=J.useRef(null);
  const [rendering,setRendering]=J.useState(true);
  const [error,setError]=J.useState(null);

  // ── رسم الـ Card على Canvas ─────────────────────────────────────────────────
  J.useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas) return;
    setRendering(true);
    setError(null);

    // أبعاد الكارد
    const W=600, PAD=28;
    // حساب الارتفاع ديناميكياً بناءً على عدد النكهات
    const flavorRows=Math.max(1,(flavors||[]).length);
    const H=400+Math.max(0,flavorRows-3)*22;
    canvas.width=W;
    canvas.height=H;
    const ctx=canvas.getContext("2d");

    // ── خلفية متدرجة ─────────────────────────────────────────────────────────
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,"#0b1120");
    grad.addColorStop(1,"#101c36");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,H);

    // ── حدود خارجية ──────────────────────────────────────────────────────────
    ctx.strokeStyle="#1e2d45";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.roundRect(1,1,W-2,H-2,16);
    ctx.stroke();

    // ── شريط علوي (header) ───────────────────────────────────────────────────
    const headerGrad=ctx.createLinearGradient(0,0,W,60);
    headerGrad.addColorStop(0,"#1d3a6e");
    headerGrad.addColorStop(1,"#0f1f3d");
    ctx.fillStyle=headerGrad;
    ctx.beginPath();
    ctx.roundRect(0,0,W,60,{upperLeft:16,upperRight:16,lowerRight:0,lowerLeft:0});
    ctx.fill();

    // ── اسم الخلطة ────────────────────────────────────────────────────────────
    ctx.font="bold 20px system-ui,Arial,sans-serif";
    ctx.fillStyle="#e2e8f0";
    ctx.textAlign="left";
    ctx.textBaseline="middle";
    const displayName=recipeName||"EPP Recipe";
    ctx.fillText("🧪 "+displayName.substring(0,30)+(displayName.length>30?"…":""),PAD,30);

    // ── تاريخ الخلط (يمين) ───────────────────────────────────────────────────
    ctx.font="12px system-ui,Arial,sans-serif";
    ctx.fillStyle="#64748b";
    ctx.textAlign="right";
    const dateStr=mixedOn?`📅 ${mixedOn}`:`📅 ${new Date().toISOString().slice(0,10)}`;
    ctx.fillText(dateStr,W-PAD,30);

    // ── خط فاصل ──────────────────────────────────────────────────────────────
    ctx.strokeStyle="#1e2d45";
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(PAD,66);
    ctx.lineTo(W-PAD,66);
    ctx.stroke();

    // ── رسم QR أولاً ثم باقي المحتوى ─────────────────────────────────────────
    const QR_SIZE=160;
    const QR_X=W-PAD-QR_SIZE;
    const QR_Y=78;

    const drawContent=(qrImg)=>{
      // ── خلفية QR ─────────────────────────────────────────────────────────
      ctx.fillStyle="#ffffff";
      ctx.beginPath();
      ctx.roundRect(QR_X-4,QR_Y-4,QR_SIZE+8,QR_SIZE+8,8);
      ctx.fill();

      if(qrImg){
        try{ ctx.drawImage(qrImg,QR_X,QR_Y,QR_SIZE,QR_SIZE); }
        catch(e){ console.warn("[RecipeCard] QR draw failed",e); }
      }

      ctx.font="10px system-ui,Arial,sans-serif";
      ctx.fillStyle="#64748b";
      ctx.textAlign="center";
      ctx.fillText(lang==="ar"?"امسح للمشاركة":"Scan to share",QR_X+QR_SIZE/2,QR_Y+QR_SIZE+14);

      // ── المعلومات الأساسية (يسار) ─────────────────────────────────────────
      let y=84;
      const COL_W=QR_X-PAD-16;

      // Volume + Ratio
      ctx.textAlign="left";
      ctx.font="bold 13px system-ui,Arial,sans-serif";
      ctx.fillStyle="#3b82f6";
      ctx.fillText("📦 "+(lang==="ar"?"الحجم":"Volume"),PAD,y);
      ctx.font="22px system-ui,Arial,sans-serif";
      ctx.fillStyle="#e2e8f0";
      ctx.fillText(`${res?.totalMl||0} ml`,PAD,y+24);
      y+=50;

      // PG / VG
      ctx.font="bold 11px system-ui,Arial,sans-serif";
      ctx.fillStyle="#64748b";
      ctx.fillText(lang==="ar"?"النسبة الفعلية":"Actual Ratio",PAD,y);
      y+=16;

      // PG bar
      const barW=COL_W-8;
      const pgPct=(res?.actualPg||0)/100;
      const vgPct=(res?.actualVg||0)/100;
      ctx.fillStyle="#1d3a6e";
      ctx.beginPath();ctx.roundRect(PAD,y,barW,12,6);ctx.fill();
      if(pgPct>0){
        ctx.fillStyle="#3b82f6";
        ctx.beginPath();ctx.roundRect(PAD,y,barW*pgPct,12,6);ctx.fill();
      }
      if(vgPct>0){
        ctx.fillStyle="#10b981";
        ctx.beginPath();ctx.roundRect(PAD+barW*pgPct,y,barW*vgPct,12,Math.min(6,barW*vgPct/2));ctx.fill();
      }
      ctx.font="11px system-ui,Arial,sans-serif";
      ctx.fillStyle="#3b82f6";
      ctx.fillText(`PG ${Math.round(res?.actualPg||0)}%`,PAD,y+24);
      ctx.fillStyle="#10b981";
      ctx.textAlign="right";
      ctx.fillText(`VG ${Math.round(res?.actualVg||0)}%`,PAD+COL_W,y+24);
      ctx.textAlign="left";
      y+=40;

      // Nicotine
      ctx.font="bold 11px system-ui,Arial,sans-serif";
      ctx.fillStyle="#64748b";
      ctx.fillText(lang==="ar"?"نيكوتين":"Nicotine",PAD,y);
      ctx.font="bold 16px system-ui,Arial,sans-serif";
      ctx.fillStyle="#f472b6";
      ctx.fillText(`${res?.actualNic||0} mg/ml`,PAD,y+18);
      y+=38;

      // ── فاصل قبل النكهات ─────────────────────────────────────────────────
      ctx.strokeStyle="#1e2d45";
      ctx.lineWidth=1;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(PAD,y);
      ctx.lineTo(W-PAD,y);
      ctx.stroke();
      ctx.setLineDash([]);
      y+=12;

      // ── النكهات ──────────────────────────────────────────────────────────
      ctx.font="bold 11px system-ui,Arial,sans-serif";
      ctx.fillStyle="#fb923c";
      ctx.fillText("🍓 "+(lang==="ar"?"النكهات":"Flavors")+(` (${(flavors||[]).length})`),PAD,y);
      y+=16;

      const fl=res?.flavors||[];
      if(fl.length===0){
        ctx.font="11px system-ui,Arial,sans-serif";
        ctx.fillStyle="#475569";
        ctx.fillText(lang==="ar"?"بدون نكهات":"No flavors",PAD+8,y+12);
        y+=24;
      } else {
        for(let i=0;i<fl.length;i++){
          const f=fl[i];
          // BUG-06 FIX: f.emoji وf.mfr أصبحا متاحين مباشرة من res.flavors (بعد
          // إصلاح _qdImpl) — أزلنا البحث القديم بالاسم في flavors الأصلية
          // (كان غير موثوق: بينكسر لو فيه نكهتين بنفس الاسم في نفس الوصفة).
          const emoji=flavorEmojiOrDefault(f.emoji);
          const mfr=f.mfr||"";
          const pct=f.pct||0;
          const ml=f.ml||0;
          // اسم + شركة
          ctx.font="12px system-ui,Arial,sans-serif";
          ctx.fillStyle="#e2e8f0";
          const nameStr=`${emoji} ${f.name}${mfr?" ("+mfr+")":""}`;
          ctx.fillText(nameStr.substring(0,38)+(nameStr.length>38?"…":""),PAD+8,y+12);
          // النسبة والـ ml (يمين)
          ctx.textAlign="right";
          ctx.fillStyle="#fb923c";
          ctx.font="bold 11px system-ui,Arial,sans-serif";
          ctx.fillText(`${pct}%  •  ${ml}ml`,W-PAD,y+12);
          ctx.textAlign="left";
          // خط فاصل خفيف
          if(i<fl.length-1){
            ctx.strokeStyle="#1e2d4530";
            ctx.lineWidth=1;
            ctx.beginPath();
            ctx.moveTo(PAD+8,y+20);
            ctx.lineTo(W-PAD,y+20);
            ctx.stroke();
          }
          y+=22;
        }
      }
      y+=8;

      // ── فاصل ─────────────────────────────────────────────────────────────
      ctx.strokeStyle="#1e2d45";
      ctx.lineWidth=1;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(PAD,y);
      ctx.lineTo(W-PAD,y);
      ctx.stroke();
      y+=14;

      // ── التكلفة ──────────────────────────────────────────────────────────
      ctx.font="bold 12px system-ui,Arial,sans-serif";
      ctx.fillStyle="#64748b";
      ctx.fillText(lang==="ar"?"التكلفة الإجمالية":"Total Cost",PAD,y);
      ctx.textAlign="right";
      ctx.font="bold 18px system-ui,Arial,sans-serif";
      ctx.fillStyle="#f59e0b";
      const costStr=fmtEGP?fmtEGP(res?.totalCost||0):`${(res?.totalCost||0).toFixed(2)} ج.م`;
      ctx.fillText(costStr,W-PAD,y);
      ctx.textAlign="left";
      y+=22;

      // التكلفة/مل
      ctx.font="11px system-ui,Arial,sans-serif";
      ctx.fillStyle="#64748b";
      ctx.fillText(`${lang==="ar"?"التكلفة/مل":"Cost/ml"}: ${fmtEGP?fmtEGP(res?.costPerMl||0):`${(res?.costPerMl||0).toFixed(3)} ج.م`}`,PAD,y);
      y+=20;

      // ── شعار EPP (footer) ─────────────────────────────────────────────────
      ctx.font="10px system-ui,Arial,sans-serif";
      ctx.fillStyle="#1e2d45";
      ctx.textAlign="center";
      ctx.fillText("⚗ EPP Calculator — حاسبة خلطات السوائل الإلكترونية",W/2,H-10);

      setRendering(false);
    };

    // توليد QR ثم رسم المحتوى
    const qrText=data||JSON.stringify({n:recipeName,vol:res?.totalMl});
    _buildQRImage(qrText,QR_SIZE)
      .then(drawContent)
      .catch(()=>drawContent(null));

  // FIX (BUG-18, اختياري): fmtEGP دالة عامة ثابتة على مستوى الملف (لا تُعاد
  // بناؤها أبداً بين التصييرات)، فإدراجها هنا كان زائداً عن الحاجة دون أي خطر
  // فعلي — حذفها هنا لتنظيف deps فقط.
  },[data,recipeName,res,flavors,mixedOn,lang]);

  // ── حفظ الصورة ──────────────────────────────────────────────────────────────
  const handleSave=J.useCallback(()=>{
    const canvas=canvasRef.current;
    if(!canvas) return;
    const link=document.createElement("a");
    const safeName=(recipeName||"recipe").replace(/[^a-zA-Z0-9\u0600-\u06FF]/g,"_").substring(0,30);
    link.download=`EPP_${safeName}_${new Date().toISOString().slice(0,10)}.png`;
    link.href=canvas.toDataURL("image/png");
    link.click();
  },[recipeName]);

  // ── Render ───────────────────────────────────────────────────────────────────
  return p.jsx("div",{role:"dialog","aria-modal":"true","aria-label":lang==="ar"?"بطاقة الخلطة":"Recipe Card",
    style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16},
    onClick:onClose,
    children:p.jsxs("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:12,maxWidth:640,width:"100%"},
      onClick:e=>e.stopPropagation(),
      children:[
        // العنوان
        p.jsxs("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%"},children:[
          p.jsx("span",{style:{color:"#a78bfa",fontWeight:700,fontSize:14},children:"🖼 "+(lang==="ar"?"بطاقة الخلطة":"Recipe Card")}),
          p.jsx("button",{onClick:onClose,"aria-label":"Close",style:{background:"transparent",border:"none",color:"#64748b",cursor:"pointer",fontSize:18,lineHeight:1},children:"✕"})
        ]}),
        // Canvas
        p.jsx("div",{style:{position:"relative",borderRadius:16,overflow:"hidden",boxShadow:"0 20px 60px rgba(0,0,0,0.6)",width:"100%"},children:[
          rendering&&p.jsx("div",{style:{position:"absolute",inset:0,background:"#0b1120",display:"flex",alignItems:"center",justifyContent:"center",color:"#3b82f6",fontSize:13},children:"⏳ "+(lang==="ar"?"جاري إنشاء البطاقة…":"Generating card…")}),
          error&&p.jsx("div",{style:{position:"absolute",inset:0,background:"#0b1120",display:"flex",alignItems:"center",justifyContent:"center",color:"#ef4444",fontSize:13},children:"⚠ "+(lang==="ar"?"خطأ في الرسم":"Render error")}),
          p.jsx("canvas",{ref:canvasRef,style:{width:"100%",height:"auto",display:"block"}})
        ]}),
        // أزرار
        p.jsxs("div",{style:{display:"flex",gap:10},children:[
          p.jsx("button",{onClick:handleSave,disabled:rendering,style:{padding:"8px 24px",borderRadius:8,border:"none",background:rendering?"#1e2d45":"#3b82f6",color:rendering?"#475569":"#fff",cursor:rendering?"default":"pointer",fontSize:13,fontWeight:700},
            children:"💾 "+(lang==="ar"?"حفظ PNG":"Save PNG")}),
          p.jsx("button",{onClick:onClose,style:{padding:"8px 16px",borderRadius:8,border:"1px solid #1e2d45",background:"transparent",color:"#64748b",cursor:"pointer",fontSize:13},
            children:lang==="ar"?"إغلاق":"Close"})
        ]})
      ]})
  });
});

// ── PDF EXPORT — Native Browser Print (no jsPDF, no eval, no CSP issues) ──────
// Uses window.print() with a dedicated print stylesheet already in index.html.
// The browser's "Print → Save as PDF" produces a cleaner result than jsPDF
// for RTL content and Arabic text, and works with any strict CSP.
// CRITICAL-14: Hardened — XSS-safe, popup fallback, null-safe guards.

/** يطهّر نص للاستخدام داخل HTML (يمنع XSS من أسماء الوصفات/المكوّنات) */
function escHtml(str){
  if(str===null||str===undefined) return "";
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

/** يتحقق أن الرقم صالح وإلا يرجّع 0 */
function safeNum(v,decimals=2){
  const n=parseFloat(v);
  return Number.isFinite(n)?n.toFixed(decimals):"0";
}

function exportPDF({res, recipeName, targetMl, t, lang, fmtEGP,
  pgBottlePrice, pgBottleSize, vgBottlePrice, vgBottleSize,
  nicBottlePrice, nicBottleSize, bottleCost, pgCost, vgCost, nicCost,
  steepDays, mixedOn}) {

  const isAr = lang === 'ar';
  const dir  = isAr ? 'rtl' : 'ltr';

// ─── ERROR BOUNDARY (CRITICAL-06) ──────────────────────────────────────────
// يلتقط أي خطأ غير متوقع في شجرة المكوّنات بدل تجميد الصفحة كاملاً.
// React class component ضروري هنا — لا يمكن استبداله بـ hook.
class ErrorBoundary extends J.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error("[ErrorBoundary] خطأ غير متوقع:", error, info);
    // SESSION-8 CRITICAL-19: تسجيل الخطأ في errorLogger
    try {
      errorLogger.logError("ErrorBoundary", error, { componentStack: info?.componentStack || "" });
    } catch(_) { /* صامد */ }
  }
  render() {
    if (this.state.hasError) {
      const msg = this.props.lang === "ar"
        ? "حدث خطأ غير متوقع. حاول تحديث الصفحة."
        : "An unexpected error occurred. Please refresh the page.";
      const btnMsg = this.props.lang === "ar" ? "تحديث الصفحة" : "Refresh Page";
      return p.jsxs("div", {
        dir: this.props.lang === "ar" ? "rtl" : "ltr",
        style: {
          display: "flex", flexDirection: "column", alignItems: "center",
          justifyContent: "center", minHeight: "60vh", gap: 16,
          fontFamily: "'Segoe UI','Arial',sans-serif", color: "#ef4444", padding: 24
        },
        children: [
          p.jsx("div", { style: { fontSize: 48 }, children: "⚠️" }),
          p.jsx("div", { style: { fontSize: 18, fontWeight: 700 }, children: msg }),
          p.jsx("div", {
            style: { fontSize: 12, color: "#888", maxWidth: 400, textAlign: "center" },
            children: String(this.state.error)
          }),
          p.jsx("button", {
            onClick: () => window.location.reload(),
            style: {
              marginTop: 8, padding: "10px 24px", borderRadius: 8,
              border: "none", background: "#ef4444", color: "#fff",
              cursor: "pointer", fontSize: 14, fontWeight: 700
            },
            children: btnMsg
          })
        ]
      });
    }
    return this.props.children;
  }
}

    <!-- SESSION-8 CRITICAL-18: PWA — Service Worker Registration & Install Prompt -->
    <script>
    // ── Service Worker Registration ──────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: './' })
          .then(reg => {
            console.log('[SW] مسجّل بنجاح:', reg.scope);
            // إذا كان هناك service worker جديد في الانتظار، أخبر المستخدم
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker?.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // Session-10 TASK-2: إطلاق حدث epp:swUpdate ليعرض React البانر
                  console.log('[SW] تحديث جديد متاح — سيظهر بانر التحديث');
                  window.dispatchEvent(new CustomEvent('epp:swUpdate', { detail: reg }));
                }
              });
            });
          })
          .catch(err => console.warn('[SW] فشل التسجيل:', err));
      });
    }

    // ── Install Prompt (beforeinstallprompt) ─────────────────────────────────
    let _deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); // منع التثبيت التلقائي
      _deferredInstallPrompt = e;
      // نشر حدث مخصص ليستجيب له React
      window.dispatchEvent(new CustomEvent('epp:installable'));
    });

    window.addEventListener('appinstalled', () => {
      _deferredInstallPrompt = null;
      console.log('[PWA] تم تثبيت التطبيق');
      window.dispatchEvent(new CustomEvent('epp:installed'));
    });

    // دالة عامة يمكن استدعاؤها من React لعرض مربع حوار التثبيت
    window.eppShowInstallPrompt = async function() {
      if (!_deferredInstallPrompt) return;
      _deferredInstallPrompt.prompt();
      const { outcome } = await _deferredInstallPrompt.userChoice;
      console.log('[PWA] اختيار المستخدم:', outcome);
      _deferredInstallPrompt = null;
    };
    </script>
